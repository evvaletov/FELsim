name: Tests

on:
  push:
    branches: [main, multisim]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy pandas matplotlib sympy PyYAML openpyxl tqdm pydantic cloudpickle
          pip install pytest

      - name: Run tests
        working-directory: backend/test
        run: |
          python -m pytest \
            test_transfer_matrices.py \
            test_chromatic_physics.py \
            test_chromatic_dipole.py \
            test_chromatic_quad.py \
            test_twiss.py \
            test_adapter_roundtrip.py \
            test_fieldmap_validation.py \
            test_attribute_guard.py \
            test_optimizer.py \
            test_edge_cases.py \
            test_multicode.py \
            test_cross_code_benchmark.py \
            test_rftrack.py \
            test_felsim_unified.py \
            test_cosy_unified.py \
            test_rftrack_unified.py \
            -v --tb=short -m "not visual"
